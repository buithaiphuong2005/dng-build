name: Build DNG Final Final
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Unzip with 7-Zip
        run: |
          # Dùng 7z để giải nén mọi file .zip tìm thấy vào thư mục hiện tại
          7z x *.zip -o. -y
          # Hiện danh sách file ngay lập tức để kiểm tra
          dir -Recurse -Depth 3

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build dng_validate
        run: |
          # Tìm file .sln bằng lệnh dir đơn giản hơn
          $sln = (dir -Recurse -Filter "dng_sdk.sln" | Select-Object -First 1).FullName
          if (-not $sln) { throw "Khong tim thay file dng_sdk.sln trong Zip!" }
          
          echo "Build file: $sln"
          msbuild $sln /p:Configuration=Release /p:Platform=x64 /t:dng_validate

      - name: Get Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dng_validate_exe
          path: "**/dng_validate.exe"
