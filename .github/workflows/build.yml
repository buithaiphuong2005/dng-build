name: Build DNG Final
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Unzip
        run: |
          # Dùng lệnh 7z chuẩn xác nhất, không dùng biến tự do
          7z x "dng-build.zip" -o"extracted_files" -y
          # Kiểm tra cấu trúc thư mục vừa giải nén
          dir extracted_files

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build dng_validate
        run: |
          # Tìm file .sln trong thư mục vừa giải nén
          $sln = (Get-ChildItem -Path "extracted_files" -Recurse -Filter "dng_sdk.sln" | Select-Object -First 1).FullName
          if (-not $sln) { throw "Khong tim thay dng_sdk.sln! Kiem tra lai file Zip." }
          
          echo "Building: $sln"
          
          # Chạy lệnh build với cấu hình Release x64
          msbuild "$sln" /p:Configuration=Release /p:Platform=x64 /t:dng_validate

      - name: Get Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dng_validate_exe
          path: "**/dng_validate.exe"
