name: Build DNG Tool From Zip
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip Source
        run: |
          # Giải nén file zip bạn đã upload
          Expand-Archive -Path dng-build.zip -DestinationPath .
          # Hiển thị danh sách file để kiểm tra
          ls

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build dng_validate
        run: |
          # Chạy lệnh build file dng_validate.exe
          msbuild dng_sdk/Targets/Windows/dng_sdk.sln /p:Configuration=Release /p:Platform=x64 /t:dng_validate /p:IncludePath="${{ github.workspace }}/XMP-Toolkit-SDK/public/include"

      - name: Get Result
        uses: actions/upload-artifact@v4
        with:
          name: dng_validate_exe
          path: dng_sdk/Targets/Windows/x64/Release/dng_validate.exe
