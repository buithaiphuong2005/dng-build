name: Build DNG Final Fix
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find and Unzip
        run: |
          # Tìm file zip và giải nén
          $zipFile = Get-ChildItem -Recurse -Filter "*.zip" | Select-Object -First 1
          if (-not $zipFile) { throw "Khong tim thay file .zip!" }
          Expand-Archive -Path $zipFile.FullName -DestinationPath . -Force

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build dng_validate
        run: |
          # Tìm đường dẫn file .sln chính xác
          $slnPath = (Get-ChildItem -Recurse -Filter "dng_sdk.sln" | Select-Object -First 1).FullName
          if (-not $slnPath) { throw "Van khong tim thay dng_sdk.sln!" }
          
          echo "Da tim thay Solution tai: $slnPath"
          # Chạy build
          msbuild $slnPath /p:Configuration=Release /p:Platform=x64 /t:dng_validate

      - name: Get Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dng_validate_exe
          path: "**/dng_validate.exe"
