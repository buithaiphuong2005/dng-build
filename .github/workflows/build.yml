name: Build DNG Final Final
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Unzip with 7-Zip
        run: |
          # Sửa lại dấu cách cho lệnh 7z và giải nén vào thư mục hiện tại
          7z x dng-build.zip -o"." -y
          # Kiểm tra xem đã có thư mục dng_sdk chưa
          dir

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build dng_validate
        run: |
          # Tìm file .sln
          $sln = (dir -Recurse -Filter "dng_sdk.sln" | Select-Object -First 1).FullName
          if (-not $sln) { throw "Khong tim thay file dng_sdk.sln sau khi giai nen!" }
          
          echo "Build file: $sln"
          msbuild $sln /p:Configuration=Release /p:Platform=x64 /t:dng_validate

      - name: Get Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dng_validate_exe
          path: "**/dng_validate.exe"
