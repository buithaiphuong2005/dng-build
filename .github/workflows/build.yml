name: Build DNG Final
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Unzip
        run: |
          7z x "dng-build.zip" -o"source" -y

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build dng_validate
        run: |
          # 1. Tìm file sln
          $sln = (Get-ChildItem -Path "source" -Recurse -Filter "dng_validate.sln" | Select-Object -First 1).FullName
          
          # 2. Tự động tìm nạp mọi đường dẫn include để sửa lỗi thiếu file .h
          $inc = (Get-ChildItem -Path "source" -Recurse -Directory -Filter "include" | Select-Object -ExpandProperty FullName) -join ";"
          $pub = (Get-ChildItem -Path "source" -Recurse -Directory -Filter "public" | Select-Object -ExpandProperty FullName) -join ";"
          $env:INCLUDE += ";$inc;$pub"
          
          echo "Building: $sln"
          
          # 3. Ép build đúng cấu hình x64 cho Windows
          msbuild "$sln" /p:Configuration=Release /p:Platform=x64 /t:dng_validate

      - name: Get Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dng_validate_exe
          path: "**/dng_validate.exe"
