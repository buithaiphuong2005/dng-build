name: Build DNG Final
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Unzip
        run: |
          # Giải nén file zip của bạn
          7z x "dng-build.zip" -o"source" -y

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build dng_validate
        run: |
          # Tìm file dng_validate.sln (đã thấy trong ảnh của bạn)
          $sln = (Get-ChildItem -Path "source" -Recurse -Filter "dng_validate.sln" | Select-Object -First 1).FullName
          if (-not $sln) { throw "Van ko thay file dng_validate.sln trong Zip!" }
          
          echo "Dang build file: $sln"
          
          # Lệnh build chính xác cho file solution của bạn
          msbuild "$sln" /p:Configuration=Release /p:Platform=x64

      - name: Get Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dng_validate_exe
          path: "**/dng_validate.exe"
